<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простой Шутер (Прототип)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Мини-Шутер</h1>
        <p>Управление: WASD - движение, Мышь - прицеливание, Клик - стрельба</p>
        <p>Счет: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, color: '#3498db', speed: 4 };
    let projectiles = [];
    let enemies = [];
    let keys = {};
    let mouse = { x: 0, y: 0 };

    // Управление
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('click', () => {
        const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        const velocity = { x: Math.cos(angle) * 8, y: Math.sin(angle) * 8 };
        projectiles.push({ x: player.x, y: player.y, radius: 5, color: '#fff', velocity });
    });

    function spawnEnemy() {
        const radius = Math.random() * (20 - 10) + 10;
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
        }
        const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
        const angle = Math.atan2(player.y - y, player.x - x);
        const velocity = { x: Math.cos(angle), y: Math.sin(angle) };
        enemies.push({ x, y, radius, color, velocity, speed: Math.random() * 2 + 1 });
    }

    setInterval(spawnEnemy, 1000);

    function animate() {
        requestAnimationFrame(animate);
        ctx.fillStyle = 'rgba(34, 34, 34, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Движение игрока
        if (keys['w'] && player.y > player.radius) player.y -= player.speed;
        if (keys['s'] && player.y < canvas.height - player.radius) player.y += player.speed;
        if (keys['a'] && player.x > player.radius) player.x -= player.speed;
        if (keys['d'] && player.x < canvas.width - player.radius) player.x += player.speed;

        // Отрисовка игрока
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();

        // Обновление пуль
        projectiles.forEach((p, index) => {
            p.x += p.velocity.x;
            p.y += p.velocity.y;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                projectiles.splice(index, 1);
            }
        });

        // Обновление врагов
        enemies.forEach((enemy, index) => {
            const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            enemy.x += Math.cos(angle) * enemy.speed;
            enemy.y += Math.sin(angle) * enemy.speed;

            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fillStyle = enemy.color;
            ctx.fill();

            // Столкновение с игроком
            const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if (distToPlayer - enemy.radius - player.radius < 1) {
                alert('Игра окончена! Счет: ' + score);
                location.reload();
            }

            // Столкновение с пулями
            projectiles.forEach((p, pIndex) => {
                const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                if (dist - enemy.radius - p.radius < 1) {
                    setTimeout(() => {
                        enemies.splice(index, 1);
                        projectiles.splice(pIndex, 1);
                        score += 10;
                        scoreEl.innerText = score;
                    }, 0);
                }
            });
        });
    }

    animate();
</script>
</body>
</html>
